# Demo/Presentation values for url-shortener
# Optimized for showing HPA scaling and load testing

backend:
  replicaCount: 2
  image:
    repository: url-shortener
    tag: latest
    pullPolicy: Never
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "500m"

frontend:
  replicaCount: 2
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"
      cpu: "200m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

config:
  databaseUrl: "sqlite:///./shortener.db"
