# Development values for url-shortener

backend:
  replicaCount: 1
  image:
    repository: url-shortener
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"
      cpu: "200m"

frontend:
  replicaCount: 1
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "16Mi"
      cpu: "25m"
    limits:
      memory: "32Mi"
      cpu: "100m"
  autoscaling:
    enabled: false

config:
  databaseUrl: "sqlite:///./shortener.db"
