{{- if .Values.config.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "url-shortener.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
data:
  database_url: {{ .Values.config.databaseUrl | quote }}
{{- end }}
