# Default values for url-shortener Helm chart

namespace: url-shortener

# Backend configuration
backend:
  enabled: true
  replicaCount: 3
  image:
    repository: url-shortener
    tag: latest
    pullPolicy: Never
  
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "500m"
  
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  
  env:
    DATABASE_URL: "sqlite:///./shortener.db"

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80
  
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"
      cpu: "200m"
  
  livenessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 30
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# ConfigMap for configuration
config:
  enabled: true
  databaseUrl: "sqlite:///./shortener.db"
