apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-backend
  labels:
    app: url-shortener
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: url-shortener
      component: backend
  template:
    metadata:
      labels:
        app: url-shortener
        component: backend
    spec:
      containers:
      - name: backend
        image: url-shortener:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: url-shortener-config
              key: database_url
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-backend
  labels:
    app: url-shortener
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: url-shortener
    component: backend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: url-shortener-config
data:
  database_url: "sqlite:///./shortener.db"
